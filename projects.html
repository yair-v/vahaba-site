<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0d0d0f;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 30px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1a1a1d;
            padding: 20px;
            border-radius: 20px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #ff4d4d;
        }

        .card h3 {
            margin: 0 0 10px;
        }

        .card p {
            color: #bbb;
            font-size: 14px;
        }

        .btn {
            margin-top: 15px;
            display: inline-block;
            padding: 10px 15px;
            background: #ff4d4d;
            border-radius: 10px;
            text-decoration: none;
            color: white;
        }

        .back {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #222;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="back" onclick="location.href='index.html'">⬅ חזרה</div>

    <div class="container">

        <h1>הפרויקטים שלי</h1>

        <div class="grid">

            <div class="card">
                <h3>📦 Order System</h3>
                <p>מערכת זיהוי טילים וסכנות</p>
                <a class="btn" href="https://iwm.diskin.net/" target="_blank">כניסה</a>
            </div>

            <div class="card">
                <h3>🕒 Attendance System</h3>
                <p>מערכת שעון נוכחות</p>
                <a class="btn" href="https://vclock-bn26.onrender.com" target="_blank">כניסה</a>
            </div>

            <div class="card">
                <h3>📡 ESP Monitor</h3>
                <p>ניטור מכשירים</p>
                <a class="btn" href="https://esp-monitor-frontend.onrender.com" target="_blank">כניסה</a>
            </div>

            <div class="card">
                <h3>🏭 Afek Warehouse</h3>
                <p>מערכת ניהול מחסן</p>
                <a class="btn" href="https://afek-render.onrender.com" target="_blank">כניסה</a>
            </div>

            <div class="card">
                <h3>🏭 Afek Warehouse</h3>
                <p>מערכת ניהול פרוייקטים</p>
                <a class="btn" href="https://vproject-cr5v.onrender.com/" target="_blank">כניסה</a>
            </div>
        </div>

    </div>

</body>

</html>
