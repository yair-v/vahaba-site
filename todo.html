<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --bg-soft: #141417;
      --panel: rgba(255,255,255,0.055);
      --border: rgba(255,255,255,0.12);
      --text: #ffffff;
      --muted: #d8d8de;
      --accent: #ff4d4d;
      --accent-2: #e23535;
      --shadow: 0 18px 50px rgba(0,0,0,0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --container: 960px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,77,77,0.10), transparent 20%),
        linear-gradient(180deg, #0b0b0d 0%, #101014 100%);
      color: var(--text);
    }

    .page-shell {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      padding: 84px 20px 28px;
    }

    .page-shell::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,77,77,0.12), transparent 22%),
        radial-gradient(circle at 86% 84%, rgba(255,255,255,0.05), transparent 18%);
      z-index: -1;
    }

    .topbar {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: white;
      cursor: pointer;
      box-shadow: var(--shadow);
      font-weight: 700;
    }

    .wrap {
      max-width: var(--container);
      margin: 0 auto;
      display: grid;
      gap: 22px;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
    }

    .card {
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: var(--radius-xl);
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      backdrop-filter: blur(8px);
    }

    .main-card { padding: 26px; }
    .side-col { display: grid; gap: 22px; }
    .side-card { padding: 22px; }

    .title {
      margin: 0 0 8px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1;
      letter-spacing: -1px;
    }

    .lead {
      margin: 0 0 24px;
      color: #e9e9ee;
      font-size: 17px;
      line-height: 1.8;
    }

    .task-form {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .task-input, .search-input {
      flex: 1;
      min-width: 220px;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      outline: none;
      font-size: 16px;
    }

    .task-input::placeholder, .search-input::placeholder { color: #bdbdc6; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 14px 18px;
      border-radius: 15px;
      border: 1px solid transparent;
      font-weight: 700;
      cursor: pointer;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, #ff5e5e, #e23535); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.16); color: white; }
    .btn-danger { background: rgba(255,94,94,0.14); border-color: rgba(255,94,94,0.22); color: white; }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      align-items: center;
    }

    .filters {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #ff5e5e, #e23535);
      border-color: transparent;
    }

    .tasks {
      display: grid;
      gap: 12px;
    }

    .task {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .task.done .task-text {
      text-decoration: line-through;
      color: #a9a9b3;
    }

    .toggle {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      cursor: pointer;
      position: relative;
    }

    .task.done .toggle {
      background: linear-gradient(135deg, #ff5e5e, #e23535);
      border-color: transparent;
    }

    .task.done .toggle::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 999px;
      background: white;
    }

    .task-text {
      font-size: 16px;
      line-height: 1.6;
      word-break: break-word;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty {
      padding: 26px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.14);
      color: #cfcfd6;
      text-align: center;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 28px;
      margin-bottom: 6px;
    }

    .stat span { color: #cfcfd6; font-size: 14px; }

    .hint {
      color: #d8d8de;
      line-height: 1.8;
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .topbar { left: 12px; top: 12px; }
      .page-shell { padding-top: 72px; }
    }

    @media (max-width: 560px) {
      .task { grid-template-columns: auto 1fr; }
      .task-actions { grid-column: 1 / -1; }
      .stats { grid-template-columns: 1fr; }
      .task-form { flex-direction: column; }
      .task-input, .search-input, .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="topbar">
      <button class="back-btn" onclick="window.location.href='index.html'">חזרה</button>
    </div>

    <div class="wrap">
      <section class="card main-card">
        <h1 class="title">TODO</h1>
        <p class="lead">רשימת משימות מהירה ונקייה, עם שמירה אוטומטית בדפדפן, שמתאימה גם למחשב וגם לנייד.</p>

        <div class="task-form">
          <input id="taskInput" class="task-input" type="text" placeholder="כתוב משימה חדשה..." />
          <button class="btn btn-primary" onclick="addTask()">הוסף</button>
        </div>

        <div class="toolbar">
          <input id="searchInput" class="search-input" type="text" placeholder="חפש משימה..." oninput="renderTasks()" />
          <div class="filters">
            <button id="filter-all" class="btn btn-secondary filter-btn active" onclick="setFilter('all')">הכול</button>
            <button id="filter-active" class="btn btn-secondary filter-btn" onclick="setFilter('active')">פעיל</button>
            <button id="filter-done" class="btn btn-secondary filter-btn" onclick="setFilter('done')">בוצע</button>
          </div>
        </div>

        <div id="tasks" class="tasks"></div>
      </section>

      <aside class="side-col">
        <section class="card side-card">
          <h2 style="margin-top:0;">סיכום</h2>
          <div class="stats">
            <div class="stat"><strong id="totalCount">0</strong><span>סך הכול</span></div>
            <div class="stat"><strong id="activeCount">0</strong><span>פעילות</span></div>
            <div class="stat"><strong id="doneCount">0</strong><span>בוצעו</span></div>
          </div>
        </section>

        <section class="card side-card">
          <h2 style="margin-top:0;">פעולות מהירות</h2>
          <div style="display:grid; gap:10px;">
            <button class="btn btn-secondary" onclick="setFilter('active')">הצג רק משימות פעילות</button>
            <button class="btn btn-secondary" onclick="setFilter('done')">הצג רק משימות שבוצעו</button>
            <button class="btn btn-danger" onclick="clearCompleted()">נקה משימות שבוצעו</button>
          </div>
        </section>

        <section class="card side-card">
          <h2 style="margin-top:0;">מידע</h2>
          <div class="hint">
            • לחיצה על העיגול מסמנת משימה כבוצעה.<br>
            • לחיצה על מחק מסירה משימה מהרשימה.<br>
            • המשימות נשמרות אוטומטית בדפדפן במכשיר שלך.
          </div>
        </section>
      </aside>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'vahaba_todo_tasks_v1';
    let tasks = [];
    let currentFilter = 'all';

    function loadTasks() {
      try {
        tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        if (!Array.isArray(tasks)) tasks = [];
      } catch (e) {
        tasks = [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('filter-' + filter);
      if (activeBtn) activeBtn.classList.add('active');
      renderTasks();
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const value = input.value.trim();
      if (!value) return;

      tasks.unshift({
        id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
        text: value,
        done: false
      });

      input.value = '';
      saveTasks();
      renderTasks();
      input.focus();
    }

    function toggleTask(id) {
      tasks = tasks.map(task => task.id === id ? { ...task, done: !task.done } : task);
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      renderTasks();
    }

    function clearCompleted() {
      tasks = tasks.filter(task => !task.done);
      saveTasks();
      renderTasks();
    }

    function updateStats() {
      const total = tasks.length;
      const done = tasks.filter(task => task.done).length;
      const active = total - done;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('activeCount').textContent = active;
      document.getElementById('doneCount').textContent = done;
    }

    function renderTasks() {
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const container = document.getElementById('tasks');

      let filtered = tasks.filter(task => task.text.toLowerCase().includes(search));
      if (currentFilter === 'active') filtered = filtered.filter(task => !task.done);
      if (currentFilter === 'done') filtered = filtered.filter(task => task.done);

      updateStats();

      if (!filtered.length) {
        container.innerHTML = '<div class="empty">אין כרגע משימות להצגה.</div>';
        return;
      }

      container.innerHTML = filtered.map(task => `
        <div class="task ${task.done ? 'done' : ''}">
          <button class="toggle" onclick="toggleTask('${task.id}')" aria-label="סמן משימה"></button>
          <div class="task-text">${escapeHtml(task.text)}</div>
          <div class="task-actions">
            <button class="btn btn-danger" onclick="deleteTask('${task.id}')">מחק</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    document.getElementById('taskInput').addEventListener('keydown', function (event) {
      if (event.key === 'Enter') addTask();
    });

    loadTasks();
    renderTasks();
  </script>
</body>
</html>
